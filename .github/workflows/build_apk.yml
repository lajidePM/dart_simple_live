name: Build Flutter Apps (Android & iOS)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev

jobs:
  # ==========================================
  # 任务 1：编译 Android 端 (解决签名空指针崩溃)
  # ==========================================
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # [新增补丁]：动态生成一个临时的签名密钥，骗过项目的本地打包校验
      - name: Fix Android Release Signing
        run: |
          # 1. 生成临时 keystore
          keytool -genkey -v -keystore dummy.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dummy -dname "CN=Dummy, OU=Dummy, O=Dummy, L=Dummy, S=Dummy, C=US" -storepass dummy123 -keypass dummy123
          
          # 2. 为手机端写入假密钥配置
          cp dummy.jks simple_live_app/android/
          cat << EOF > simple_live_app/android/key.properties
          storePassword=dummy123
          keyPassword=dummy123
          keyAlias=dummy
          storeFile=dummy.jks
          EOF
          
          # 3. 为电视端写入假密钥配置
          cp dummy.jks simple_live_tv_app/android/
          cat << EOF > simple_live_tv_app/android/key.properties
          storePassword=dummy123
          keyPassword=dummy123
          keyAlias=dummy
          storeFile=dummy.jks
          EOF

      - name: Build Phone App APK
        run: |
          cd simple_live_app
          flutter pub get
          flutter build apk --release

      - name: Build TV App APK
        run: |
          cd simple_live_tv_app
          flutter pub get
          flutter build apk --release

      - name: Upload Phone APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive-Phone-APK
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive-TV-APK
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-release.apk

  # ==========================================
  # 任务 2：编译 iOS 端 (解决旧版 Xcode 缺乏新 API 的问题)
  # ==========================================
  build-ios:
    name: Build iOS IPA
    # [关键修改]：将 macos-latest 强制改为 macos-14，以使用最新的 Xcode 15 环境
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      # [新增补丁]：强制提升 iOS 编译兼容版本底线，匹配 connectivity_plus 插件要求
      - name: Fix iOS Target Version
        run: |
          cd simple_live_app/ios
          sed -i '' 's/platform :ios, .*/platform :ios, '\''13.0'\''/g' Podfile || true

      - name: Build iOS App (无签名模式)
        run: |
          cd simple_live_app
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Package App into IPA
        run: |
          cd simple_live_app/build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r SimpleLive-iOS-Unsigned.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLive-iOS-IPA
          path: simple_live_app/build/ios/iphoneos/SimpleLive-iOS-Unsigned.ipa
